<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | AutoParts</title>
  <link rel="stylesheet" href="css/loginstylefinal1.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-container">
    <form class="login-card" id="login-form">
      <h1>Login to AutoParts</h1>
      <!-- Error Box -->
  <div id="error-message" class="error-message hidden">
    <span id="error-text"></span> 
    <button type="button" class="close-error" onclick="closeError()">×</button>
  </div>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required />
      <input type="submit" value="Login" class="btn-login" />
      <div class="form-footer">
        <a class="home-button" href="homepage.html">← Back to Home</a>
        <p>
        <a class="redirect" href="signup.html">Don't have an account? <strong>Sign up</strong></a>
        </p>
      </div>
    </form>
  </div>
<script>
  function showError(message) {
    let errorBox = document.getElementById('error-message');
    if (!errorBox) {
      errorBox = document.createElement('div');
      errorBox.id = 'error-message';
      errorBox.style.color = 'red';
      errorBox.style.marginBottom = '15px';
      errorBox.style.fontWeight = 'bold';
      document.querySelector('.login-card').prepend(errorBox);
    }
    errorBox.textContent = message;
    errorBox.style.display = 'block';
  }

  function clearError() {
    const errorBox = document.getElementById('error-message');
    if (errorBox) {
      errorBox.textContent = '';
      errorBox.style.display = 'none';
    }
  }

  async function handleLogin(event) {
    event.preventDefault();
    clearError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const role = 'user'; // Default to user login

    try {
      const response = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role })
      });

      const data = await response.json();
      
      if (response.ok) {
        window.location.href = data.redirect; // Redirect to homepage or admin page
      } else {
        showError(data.error || 'Login failed');
      }

    } catch (err) {
      showError('Something went wrong. Please try again later.');
      console.error('Login error:', err);

    }
  }

  // ✅ Attach event listener to the form
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('login-form');
    if (form) {
      form.addEventListener('submit', handleLogin);
    }
  });
  
</script>
</body>
</html>
