<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Listed Products</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      padding: 40px;
      background-color: #f2f2f2;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 16px 20px;
      text-align: left;
    }

    thead {
      background-color: #007bff;
      color: #fff;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .actions button {
      margin-right: 10px;
      padding: 6px 12px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .view-btn {
      background-color: #17a2b8;
      color: white;
    }

    .edit-btn {
      background-color: #ffc107;
      color: white;
    }

    .delete-btn {
      background-color: #dc3545;
      color: white;
    }

    .actions button:hover {
      opacity: 0.9;
    }
    
    button {
      margin-top: 50px;
      align-items: center;
      padding: 12px 20px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      background-color: rgb(159, 149, 149);
      color: black;
      cursor: pointer;
      transition: background-color 0.3s;
    }


    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 15px;
        background-color: #fff;
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 5px 10px rgba(0,0,0,0.05);
      }

      td {
        display: flex;
        justify-content: space-between;
        padding: 12px;
        border-bottom: 1px solid #eee;
      }

      td:last-child {
        border-bottom: none;
      }

      .actions {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>

  <h1>🗂️ All Listed Products</h1>

  <table>
    <thead>
      <tr>
        <th>Product ID</th>
        <th>Name</th>
        <th>Date Listed</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="productTableBody">
      <!-- Dynamic rows will be inserted here with JS or backend template -->
      <tr>
        <td>ENG-001</td>
        <td>Turbocharger</td>
        <td>2025-07-16</td>
        <td class="actions">
          <button class="view-btn" onclick="location.href='view-product.html?id=ENG-001'">View</button>
          <button class="edit-btn" onclick="location.href='edit-product.html?id=ENG-001'">Edit</button>
          <button class="delete-btn" onclick="deleteProduct('ENG-001')">Delete</button>
        </td>
      </tr>
      <!-- Add more rows dynamically -->
    </tbody>
  </table>
  <div>
  <button class onClick="window.location.href='admin_dashboard.html'"> Back to Dashboard </button>
  </div>

  <script>
    // This would be replaced by actual backend logic (or fetch from API)
    function deleteProduct(productId) {
      if (confirm(`Are you sure you want to delete product ${productId}?`)) {
        // Send DELETE request to server (e.g. via fetch)
        alert("Deleted product " + productId);
        // Refresh or remove row from DOM
      }
    }
  </script>

</body>
</html>
